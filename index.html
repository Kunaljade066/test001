<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d0f14;
  --surf:    #13161e;
  --surf2:   #1a1d27;
  --border:  #22263a;
  --text:    #e2e4ee;
  --muted:   #525870;
  --accent:  #4f6ef7;
  --green:   #34c97a;
  --yellow:  #f5a623;
  --red:     #f04e6a;
  --orange:  #f07a4e;
  --blue:    #4eb8f0;
  --purple:  #9b6ef7;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;font-size:12px;background:var(--bg);color:var(--text);overflow-x:hidden;}

/* scrollbar */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* header */
.hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--surf);}
.hdr h1{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;flex:1;letter-spacing:-.3px;}
.hdr-badge{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);background:var(--surf2);border:1px solid var(--border);border-radius:4px;padding:2px 7px;}
.refresh-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;padding:5px 8px;font-size:12px;transition:all .15s;}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent);}
.refresh-btn.spin{animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* tabs */
.tabs{display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border);}
.tab{flex:1;padding:9px;text-align:center;cursor:pointer;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:var(--muted);background:var(--surf);border:none;transition:all .15s;letter-spacing:.3px;}
.tab.active{background:var(--bg);color:var(--text);}
.tab:hover:not(.active){color:var(--text);}

.body{padding:14px;}
.panel{display:none;}
.panel.active{display:block;}

/* loading */
.loading{text-align:center;padding:48px 0;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;}

/* summary cards */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.card{background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:12px;border-top:2px solid var(--border);}
.card.g{border-top-color:var(--green);}
.card.r{border-top-color:var(--red);}
.card.y{border-top-color:var(--yellow);}
.card.b{border-top-color:var(--accent);}
.card .n{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1;margin-bottom:3px;}
.card.g .n{color:var(--green);}
.card.r .n{color:var(--red);}
.card.y .n{color:var(--yellow);}
.card.b .n{color:var(--accent);}
.card .l{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;}

/* section header */
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:18px;}
.sec-hdr h2{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.sec-line{flex:1;height:1px;background:var(--border);}

/* heatmap */
.heatmap-wrap{background:var(--surf);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;}
.heatmap-row{display:grid;align-items:center;border-bottom:1px solid var(--border);transition:background .1s;}
.heatmap-row:last-child{border-bottom:none;}
.heatmap-row:hover{background:var(--surf2);}
.hm-feature{padding:8px 12px;font-size:11px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hm-bar-wrap{padding:0 8px;}
.hm-bar-bg{background:var(--surf2);border-radius:3px;height:6px;overflow:hidden;}
.hm-bar{height:6px;border-radius:3px;transition:width .4s ease;}
.hm-pct{padding:0 8px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;text-align:right;white-space:nowrap;}
.hm-stats{display:flex;gap:4px;padding:0 12px 0 4px;justify-content:flex-end;}
.pill{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-family:'DM Mono',monospace;padding:2px 5px;border-radius:3px;font-weight:500;}
.pill.bugged{background:rgba(240,78,106,.12);color:var(--red);}
.pill.blocked{background:rgba(0,0,0,.3);color:#aaa;}
.pill.prog{background:rgba(79,110,247,.12);color:var(--accent);}
.pill.nt{background:rgba(82,88,112,.12);color:var(--muted);}
.pill.urg{background:rgba(240,122,78,.2);color:var(--orange);}
.heatmap-legend{display:flex;gap:16px;padding:10px 12px;border-top:1px solid var(--border);background:var(--surf2);}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);}
.legend-dot{width:8px;height:8px;border-radius:2px;}

/* velocity table */
.vtable{width:100%;border-collapse:collapse;background:var(--surf);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.vtable th{padding:8px 10px;text-align:left;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);background:var(--surf2);border-bottom:1px solid var(--border);}
.vtable td{padding:7px 10px;border-bottom:1px solid var(--border);font-size:11px;vertical-align:middle;}
.vtable tr:last-child td{border-bottom:none;}
.vtable tr:hover td{background:var(--surf2);}
.tname{font-weight:500;color:var(--text);}
.relbadge{background:var(--surf2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);}
.relbadge.current{border-color:var(--accent);color:var(--accent);}
.rate-bar{display:flex;align-items:center;gap:6px;}
.rate-bg{flex:1;background:var(--surf2);border-radius:3px;height:5px;overflow:hidden;min-width:50px;}
.rate-fill{height:5px;border-radius:3px;}
.rate-num{font-family:'DM Mono',monospace;font-size:10px;min-width:28px;text-align:right;}

/* tester summary cards */
.tester-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
.tcard{background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:12px;}
.tcard-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.tcard-avatar{width:22px;height:22px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0;}
.tcard-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;}
.ts{text-align:center;padding:6px 4px;background:var(--surf2);border-radius:5px;}
.ts .tv{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;line-height:1;}
.ts .tl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px;}

/* release filter */
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.filter-chip{padding:4px 10px;border-radius:5px;cursor:pointer;font-size:10px;font-family:'Syne',sans-serif;font-weight:700;background:var(--surf2);color:var(--muted);border:1px solid var(--border);transition:all .15s;}
.filter-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.filter-chip:hover:not(.active){color:var(--text);}

.sync-time{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);}
.empty{text-align:center;padding:32px;color:var(--muted);font-size:11px;}
</style>
</head>
<body>

<div class="hdr">
  <h1>⚡ QA Intelligence</h1>
  <span class="sync-time" id="sync-time"></span>
  <button class="refresh-btn" id="rbtn" onclick="load()" title="Refresh">↻</button>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('coverage',this)">Coverage Heatmap</button>
  <button class="tab" onclick="switchTab('velocity',this)">Tester Velocity</button>
</div>

<div class="body">
  <div id="coverage" class="panel active"><div class="loading"><div class="spinner"></div>Loading…</div></div>
  <div id="velocity" class="panel"><div class="loading"><div class="spinner"></div>Loading…</div></div>
</div>

<script>
var data = null;
var activeRelease = "All";

function load() {
  var btn = document.getElementById('rbtn');
  btn.classList.add('spin');
  google.script.run
    .withSuccessHandler(function(json) {
      data = JSON.parse(json);
      renderCoverage();
      renderVelocity();
      btn.classList.remove('spin');
      var d = new Date(data.generatedAt);
      document.getElementById('sync-time').textContent =
        d.getHours() + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    })
    .withFailureHandler(function(e) {
      document.getElementById('coverage').innerHTML = '<div class="empty">❌ ' + e.message + '</div>';
      btn.classList.remove('spin');
    })
    .getDashboardJson();
}
load();

// ── COVERAGE ─────────────────────────────────────────────────
function renderCoverage() {
  var c = data.coverage;
  if (!c || !c.length) {
    document.getElementById('coverage').innerHTML = '<div class="empty">No data</div>';
    return;
  }

  var totalBugs    = c.reduce(function(s,f){return s+f.total;},0);
  var totalPassed  = c.reduce(function(s,f){return s+f.passed;},0);
  var totalBugged  = c.reduce(function(s,f){return s+f.bugged;},0);
  var totalBlocked = c.reduce(function(s,f){return s+f.blocked;},0);
  var overallRate  = totalBugs ? Math.round(totalPassed/totalBugs*100) : 0;
  var urgentOpen   = c.reduce(function(s,f){return s+f.urgentOpen;},0);

  var html = '';

  // Summary cards
  html += '<div class="summary">';
  html += card(overallRate + '%', 'Overall Pass Rate', 'g');
  html += card(totalBugs,         'Total Bugs',        'b');
  html += card(totalBugged,       'Still Bugged',      'r');
  html += card(urgentOpen,        'Urgent Open',       'y');
  html += '</div>';

  // Heatmap
  html += '<div class="sec-hdr"><h2>Feature Coverage</h2><div class="sec-line"></div></div>';

  // Sort by pass rate ascending (worst first)
  var sorted = c.slice().sort(function(a,b){return a.passRate - b.passRate;});

  html += '<div class="heatmap-wrap">';
  // Column widths: feature | bar | % | pills
  sorted.forEach(function(f) {
    var color = f.passRate >= 80 ? 'var(--green)' : f.passRate >= 50 ? 'var(--yellow)' : 'var(--red)';
    var pctColor = f.passRate >= 80 ? '#34c97a' : f.passRate >= 50 ? '#f5a623' : '#f04e6a';
    html += '<div class="heatmap-row" style="grid-template-columns:160px 1fr 48px 180px">';
    html += '<div class="hm-feature" title="' + f.feature + '">' + f.feature + '</div>';
    html += '<div class="hm-bar-wrap"><div class="hm-bar-bg"><div class="hm-bar" style="width:' + f.passRate + '%;background:' + color + '"></div></div></div>';
    html += '<div class="hm-pct" style="color:' + pctColor + '">' + f.passRate + '%</div>';
    html += '<div class="hm-stats">';
    if (f.bugged)     html += pill(f.bugged,     '🔴', 'bugged');
    if (f.blocked)    html += pill(f.blocked,    '⛔', 'blocked');
    if (f.inProgress) html += pill(f.inProgress, '🔵', 'prog');
    if (f.notTested)  html += pill(f.notTested,  '⚪', 'nt');
    if (f.urgentOpen) html += pill(f.urgentOpen, '🚨', 'urg');
    html += '</div></div>';
  });
  html += '</div>';

  html += '<div class="heatmap-legend">';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>0–49% pass</div>';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>50–79%</div>';
  html += '<div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>80–100%</div>';
  html += '<div class="legend-item">🔴 bugged &nbsp; ⛔ blocked &nbsp; 🔵 in progress &nbsp; ⚪ not tested &nbsp; 🚨 urgent open</div>';
  html += '</div>';

  document.getElementById('coverage').innerHTML = html;
}

// ── VELOCITY ─────────────────────────────────────────────────
function renderVelocity() {
  var v  = data.velocity;
  var ts = data.testerSummary;
  var releases = ['All'].concat(data.releases);

  if (!v || !v.length) {
    document.getElementById('velocity').innerHTML = '<div class="empty">No velocity data. Add release sheets via <b>registerReleaseSheets()</b> in Apps Script.</div>';
    return;
  }

  var html = '';

  // Tester summary cards
  html += '<div class="sec-hdr"><h2>Tester Overview</h2><div class="sec-line"></div></div>';
  html += '<div class="tester-grid">';
  ts.sort(function(a,b){return b.totalBugs-a.totalBugs;}).forEach(function(t) {
    var rateColor = t.avgPassRate >= 70 ? 'var(--green)' : t.avgPassRate >= 40 ? 'var(--yellow)' : 'var(--red)';
    html += '<div class="tcard">';
    html += '<div class="tcard-name"><div class="tcard-avatar">' + t.tester.slice(0,2).toUpperCase() + '</div>' + t.tester + '</div>';
    html += '<div class="tcard-stats">';
    html += tstat(t.totalBugs,     'Total',    'var(--accent)');
    html += tstat(t.totalVerified, 'Verified', 'var(--green)');
    html += tstat(t.avgPassRate+'%','Pass Rate', rateColor);
    html += '</div></div>';
  });
  html += '</div>';

  // Release filter chips
  html += '<div class="sec-hdr"><h2>By Release</h2><div class="sec-line"></div></div>';
  html += '<div class="filter-row" id="rel-filters">';
  releases.forEach(function(r) {
    var isActive = r === activeRelease;
    html += '<div class="filter-chip' + (isActive?' active':'') + '" onclick="filterRelease(\'' + esc(r) + '\')">' + r + '</div>';
  });
  html += '</div>';

  // Velocity table
  var filtered = activeRelease === 'All' ? v : v.filter(function(r){return r.release===activeRelease;});
  filtered.sort(function(a,b){return b.total-a.total;});

  html += '<table class="vtable"><thead><tr>';
  html += '<th>Tester</th><th>Release</th><th>Total</th><th>Verified</th><th>Open</th><th>Blocked</th><th>Pass Rate</th>';
  html += '</tr></thead><tbody>';

  filtered.forEach(function(r) {
    var rateColor = r.passRate >= 70 ? 'var(--green)' : r.passRate >= 40 ? 'var(--yellow)' : 'var(--red)';
    var isCurrent = r.release === 'Current';
    html += '<tr>';
    html += '<td><span class="tname">' + r.tester + '</span></td>';
    html += '<td><span class="relbadge' + (isCurrent?' current':'') + '">' + r.release + '</span></td>';
    html += '<td><b style="color:var(--accent)">' + r.total + '</b></td>';
    html += '<td><b style="color:var(--green)">' + r.verified + '</b></td>';
    html += '<td>' + (r.open || '—') + '</td>';
    html += '<td>' + (r.blocked ? '<b style="color:var(--red)">' + r.blocked + '</b>' : '—') + '</td>';
    html += '<td><div class="rate-bar"><div class="rate-bg"><div class="rate-fill" style="width:' + r.passRate + '%;background:' + rateColor + '"></div></div><span class="rate-num" style="color:' + rateColor + '">' + r.passRate + '%</span></div></td>';
    html += '</tr>';
  });

  if (!filtered.length) html += '<tr><td colspan="7" class="empty">No data for this release</td></tr>';
  html += '</tbody></table>';

  document.getElementById('velocity').innerHTML = html;
}

function filterRelease(r) {
  activeRelease = r;
  renderVelocity();
}

// ── helpers ───────────────────────────────────────────────────
function card(val, label, cls) {
  return '<div class="card ' + cls + '"><div class="n">' + val + '</div><div class="l">' + label + '</div></div>';
}
function pill(n, emoji, cls) {
  return '<span class="pill ' + cls + '">' + emoji + ' ' + n + '</span>';
}
function tstat(val, label, color) {
  return '<div class="ts"><div class="tv" style="color:' + color + '">' + val + '</div><div class="tl">' + label + '</div></div>';
}
function switchTab(id, el) {
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  el.classList.add('active');
  document.getElementById(id).classList.add('active');
}
function pad(n){return String(n).padStart(2,'0');}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
</script>
</body>
</html>
